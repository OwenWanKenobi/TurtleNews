---
layout: default
---
<section class="page-hero">
  <div class="container narrow">
    <p class="section-label">{{ page.kicker | default: "Turtle News" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content">
  <div class="container narrow prose">
    {{ content }}
  </div>
</section>
